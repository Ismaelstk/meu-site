<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#F8F7F2;--card:#FFFFFF;--card2:#F0EEE8;--border:#DDD9CF;
  --text:#0F2461;--text2:#1A3A8F;--text3:#6A7F9A;
  --shadow:0 2px 8px rgba(15,36,97,.08),0 4px 16px rgba(15,36,97,.06);
  --r:14px;--rs:10px;
  --pri:#1A3A8F;--pri-bg:#EEF0FB;--pri-t:#0F2461;
  --green:#2E9E6B;--green-bg:#E8F5EF;
  --red:#C0392B;--red-bg:#FEECEC;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
.edu-bg{position:fixed;inset:0;width:100vw;height:100vh;pointer-events:none;z-index:0;overflow:hidden}
.topbar,.main,footer{position:relative;z-index:1}
.topbar{background:var(--pri);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:52px;box-shadow:0 2px 8px rgba(15,36,97,.15)}
.topbar-logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.topbar-badge{font-size:.7rem;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.28);border-radius:20px;padding:3px 10px;color:#fff;font-weight:700;letter-spacing:.8px;text-transform:uppercase}
.topbar-back{font-size:.78rem;color:rgba(255,255,255,.8);text-decoration:none;display:inline-flex;align-items:center;gap:5px}
.topbar-back:hover{color:#fff}
.main{flex:1;display:flex;align-items:center;justify-content:center;padding:32px 20px}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:36px;width:100%;max-width:420px;box-shadow:var(--shadow)}
.card h1{font-family:'Plus Jakarta Sans',sans-serif;font-size:1.4rem;font-weight:800;text-align:center;margin-bottom:6px}
.subtitle{text-align:center;font-size:.85rem;color:var(--text3);margin-bottom:22px}
.field{margin-bottom:14px}
.field label{display:block;font-size:.72rem;font-weight:700;color:var(--text2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.3px}
.field input{width:100%;padding:10px 13px;border:1.5px solid var(--border);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:.9rem;color:var(--text);outline:none;transition:border-color .2s}
.field input:focus{border-color:var(--pri)}
.btn{display:block;width:100%;padding:12px;background:var(--pri);color:#fff;border:none;border-radius:8px;font-family:'Plus Jakarta Sans',sans-serif;font-size:.9rem;font-weight:700;cursor:pointer;transition:all .2s;margin-top:8px}
.btn:hover{background:var(--pri-t)}.btn:disabled{opacity:.5;cursor:not-allowed}
.error{display:none;background:var(--red-bg);color:var(--red);border:1px solid var(--red);border-radius:8px;padding:9px 13px;font-size:.82rem;margin-bottom:12px}
.error.show{display:block}
.divider{border:none;border-top:1px solid var(--border);margin:20px 0 14px}
.note{font-size:.75rem;color:var(--text3);text-align:center}
footer{padding:16px 24px;text-align:center;border-top:1px solid var(--border)}
footer p{font-size:.72rem;color:var(--text3)}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const cfg={apiKey:"AIzaSyD_IoIlMiPvDRoJJWM2_LMg6cZQqcB7tao",authDomain:"mira-b17cb.firebaseapp.com",projectId:"mira-b17cb",storageBucket:"mira-b17cb.firebasestorage.app",messagingSenderId:"989601201413",appId:"1:989601201413:web:e81c9f2455c908a5594b6c"};
const app=initializeApp(cfg);
const auth=getAuth(app);
const db=getFirestore(app);
document.getElementById('yr').textContent=new Date().getFullYear();
onAuthStateChanged(auth,async u=>{
  if(!u)return;
  const s=await getDoc(doc(db,'usuarios',u.uid));
  if(!s.exists())return;
  const data=s.data();
  if(data.status==='inativo'){await auth.signOut();return;}
  window.location.href=data.role==='admin'?'admin.html':'editor.html';
});
window.doLogin=async function(){
  const email=document.getElementById('email').value.trim();
  const senha=document.getElementById('senha').value;
  const btn=document.getElementById('btnLogin');
  const err=document.getElementById('err');
  err.classList.remove('show');
  if(!email||!senha){err.textContent='Preencha email e senha.';err.classList.add('show');return;}
  btn.disabled=true;btn.textContent='Entrando...';
  try{
    const c=await signInWithEmailAndPassword(auth,email,senha);
    const s=await getDoc(doc(db,'usuarios',c.user.uid));
    if(!s.exists()){err.textContent='Usuário sem perfil. Contate o administrador.';err.classList.add('show');btn.disabled=false;btn.textContent='Entrar';return;}
    window.location.href=s.data().role==='admin'?'admin.html':'editor.html';
  }catch(e){
    const msgs={'auth/user-not-found':'Email não encontrado.','auth/wrong-password':'Senha incorreta.','auth/invalid-credential':'Email ou senha incorretos.','auth/too-many-requests':'Muitas tentativas. Aguarde.'};
    err.textContent=msgs[e.code]||'Erro ao entrar.';
    err.classList.add('show');btn.disabled=false;btn.textContent='Entrar';
  }
};
document.addEventListener('keydown',e=>{if(e.key==='Enter')window.doLogin();});
// ── LOGO FROM FIRESTORE ────────────────────────────────────────────────────
async function loadLogo() {
  try {
    const cfgSnap = await getDoc(doc(db, 'configuracoes', 'escola'));
    if (cfgSnap.exists() && cfgSnap.data().logoURL) {
      const url = cfgSnap.data().logoURL;
      document.querySelectorAll('.mira-logo-img').forEach(el => {
        el.src = url;
        el.style.setProperty('display', 'block', 'important');
      });
      document.querySelectorAll('.mira-logo-svg').forEach(el => {
        el.style.setProperty('display', 'none', 'important');
      });
    }
  } catch(e) { console.warn('Logo não carregada:', e.message); }
}

// Call on init
loadLogo();
</script>
</body>
