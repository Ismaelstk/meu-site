<html lang="pt-BR">
<head>
<script>(function(){if(localStorage.getItem('mira-theme')==='dark')document.documentElement.classList.add('dark');})()</script>
<script>
window.toggleDark=function(){
  var isDark=document.documentElement.classList.toggle('dark');
  localStorage.setItem('mira-theme',isDark?'dark':'light');
  var moon=document.getElementById('dark-icon-moon');
  var sun=document.getElementById('dark-icon-sun');
  if(moon)moon.style.display=isDark?'none':'';
  if(sun)sun.style.display=isDark?'':'none';
};
document.addEventListener('DOMContentLoaded',function(){
  var isDark=document.documentElement.classList.contains('dark');
  var moon=document.getElementById('dark-icon-moon');
  var sun=document.getElementById('dark-icon-sun');
  if(moon)moon.style.display=isDark?'none':'';
  if(sun)sun.style.display=isDark?'':'none';
});
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MIRA — Horários</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#F8F7F2;--card:#FFFFFF;--card2:#F0EEE8;--border:#DDD9CF;
  --text:#0F2461;--text2:#1A3A8F;--text3:#6A7F9A;
  --shadow:0 1px 3px rgba(15,36,97,.07),0 4px 12px rgba(15,36,97,.05);
  --shadow2:0 2px 8px rgba(15,36,97,.10),0 8px 24px rgba(15,36,97,.08);
  --r:14px;--rs:10px;
  --pri:#1A3A8F;--pri-bg:#EEF0FB;--pri-t:#0F2461;
  --gold:#E8B800;--gold-bg:#FFFBE6;--gold-t:#9A7800;
  --green:#2E9E6B;--green-bg:#E8F5EF;--green-t:#1A6B47;
  --red:#C0392B;--red-bg:#FEECEC;
}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.65}
.app{max-width:1100px;margin:0 auto;padding:0 20px 40px}

/* TOPBAR */
.topbar{background:var(--pri);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:52px;box-shadow:0 2px 8px rgba(15,36,97,.15)}
.topbar a{text-decoration:none;display:flex;align-items:center}
.nav-links{display:flex;align-items:center;gap:14px}
.nav-links a{font-size:.78rem;color:rgba(255,255,255,.8);text-decoration:none;font-weight:500}.nav-links a:hover{color:#fff}

/* HERO */
.hero{text-align:center;padding:48px 20px 24px}
.hero h1{font-family:'Plus Jakarta Sans',sans-serif;font-size:clamp(1.6rem,4vw,2.2rem);font-weight:800;letter-spacing:-.3px}
.hero p{color:var(--text3);font-size:.9rem;margin-top:6px}

/* TABS */
.tabs{display:flex;justify-content:center;gap:6px;margin-bottom:24px}
.tab{padding:10px 28px;border-radius:40px;font-family:'Plus Jakarta Sans',sans-serif;font-size:.85rem;font-weight:700;cursor:pointer;border:2px solid var(--border);background:var(--card);color:var(--text3);transition:all .2s}
.tab:hover{border-color:var(--pri);color:var(--pri)}
.tab.active{background:var(--pri);color:#fff;border-color:var(--pri)}

/* TURNO TABS */
.turno-tabs{display:flex;justify-content:center;gap:6px;margin-bottom:20px}
.turno-tab{padding:7px 20px;border-radius:20px;font-size:.78rem;font-weight:700;cursor:pointer;border:1.5px solid var(--border);background:var(--card);color:var(--text3);transition:all .2s;font-family:'Plus Jakarta Sans',sans-serif}
.turno-tab:hover{border-color:var(--pri)}
.turno-tab.active{background:var(--pri-bg);color:var(--pri);border-color:var(--pri)}

/* SEARCH */
.search-wrap{max-width:480px;margin:0 auto 24px}
.search-box{display:flex;align-items:center;gap:10px;background:var(--card);border:2px solid var(--border);border-radius:40px;padding:10px 18px;transition:border-color .2s;box-shadow:var(--shadow)}
.search-box:focus-within{border-color:var(--pri)}
.search-box svg{color:var(--text3);flex-shrink:0;width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:2}
.search-box input{border:none;outline:none;background:transparent;font-family:'DM Sans',sans-serif;font-size:.88rem;color:var(--text);flex:1}
.search-box input::placeholder{color:var(--text3)}

/* GRID DE CARDS */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:32px}
.item-card{background:var(--card);border:1.5px solid var(--border);border-radius:var(--rs);padding:14px 16px;cursor:pointer;transition:all .25s;position:relative;overflow:hidden}
.item-card:hover{transform:translateY(-2px);box-shadow:var(--shadow2);border-color:var(--pri)}
.item-card.active{border-color:var(--pri);background:var(--pri-bg)}
.item-card .ic-name{font-family:'Plus Jakarta Sans',sans-serif;font-size:.88rem;font-weight:700}
.item-card .ic-meta{font-size:.72rem;color:var(--text3);margin-top:2px}

/* TABELA HORÁRIO */
.schedule-wrap{background:var(--card);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden;margin-bottom:24px;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.schedule-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.sh-left{display:flex;align-items:center;gap:14px}
.sh-icon{width:48px;height:48px;border-radius:12px;background:var(--pri-bg);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sh-icon svg{width:24px;height:24px;stroke:var(--pri);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.sh-title{font-family:'Plus Jakarta Sans',sans-serif;font-size:1.15rem;font-weight:800}
.sh-sub{font-size:.78rem;color:var(--text3);margin-top:1px}
.btn-pdf{display:inline-flex;align-items:center;gap:6px;padding:9px 20px;background:var(--pri);color:#fff;border:none;border-radius:8px;font-family:'Plus Jakarta Sans',sans-serif;font-size:.8rem;font-weight:700;cursor:pointer;transition:all .2s}
.btn-pdf:hover{background:var(--pri-t)}

/* TABELA */
.tbl-scroll{overflow-x:auto;padding:0 4px 4px}
table{width:100%;border-collapse:separate;border-spacing:3px;font-size:.82rem;margin:12px 0 16px}
table th{background:var(--pri);color:#fff;padding:10px 8px;text-align:center;font-family:'Plus Jakarta Sans',sans-serif;font-size:.72rem;font-weight:700;letter-spacing:.5px;text-transform:uppercase;border-radius:6px;min-width:100px}
table th:first-child{min-width:70px;background:var(--pri-t)}
table td{padding:8px 6px;text-align:center;border-radius:6px;vertical-align:top;min-height:52px;transition:transform .15s}
table td:hover{transform:scale(1.02)}
table td:first-child{font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:.7rem;color:var(--pri);background:var(--pri-bg);letter-spacing:.3px;vertical-align:middle;min-width:70px}
.cell-disc{font-weight:700;font-size:.76rem;letter-spacing:.2px;margin-bottom:2px}
.cell-prof{font-size:.68rem;color:var(--text3);font-weight:500}
.cell-turma{font-size:.68rem;color:var(--text3);font-weight:500}
.cell-empty{background:var(--card2);color:var(--text3);font-size:.72rem;opacity:.5}
.cell-recreio{background:repeating-linear-gradient(45deg,transparent,transparent 4px,rgba(26,58,143,.03) 4px,rgba(26,58,143,.03) 8px);text-align:center;font-size:.68rem;color:var(--text3);font-style:italic;padding:4px}

/* CORES POR DISCIPLINA */
.d-port{background:#E8F5EF;color:#1A6B47}.d-mat{background:#FFFBE6;color:#9A7800}.d-cien{background:#EDE9FE;color:#6D28D9}
.d-hist{background:#FEF3C7;color:#92400E}.d-geo{background:#E0F2FE;color:#0369A1}.d-ing{background:#FCE7F3;color:#9D174D}
.d-art{background:#FDF2F8;color:#BE185D}.d-ef{background:#DCFCE7;color:#16A34A}.d-rel{background:#F5F3FF;color:#7C3AED}
.d-fin{background:#EEF0FB;color:#1A3A8F}.d-let{background:#FFF7ED;color:#C2410C}

/* LEGENDA */
.legenda{display:flex;flex-wrap:wrap;gap:6px;padding:12px 20px;border-top:1px solid var(--border);justify-content:center}
.leg-item{display:flex;align-items:center;gap:4px;font-size:.68rem;color:var(--text3)}
.leg-dot{width:10px;height:10px;border-radius:3px}

/* FOOTER */
footer{border-top:1px solid var(--border);padding:20px;text-align:center}
footer p{font-size:.72rem;color:var(--text3)}

/* DARK MODE */
:root.dark{
  --bg:#111827;--card:#1F2937;--card2:#374151;--border:#374151;
  --text:#F9FAFB;--text2:#E5E7EB;--text3:#9CA3AF;
  --shadow:0 2px 8px rgba(0,0,0,.3);--shadow2:0 4px 16px rgba(0,0,0,.4);
  --pri:#4F7FE8;--pri-bg:#1E2A45;--pri-t:#93B4F5;
  --gold:#F59E0B;--gold-bg:#2A1F00;--gold-t:#FCD34D;
  --green:#34D399;--green-bg:#022C22;--green-t:#6EE7B7;
  --red:#F87171;--red-bg:#2A0A0A;
}
:root.dark .d-port{background:#0B3D2E;color:#6EE7B7}:root.dark .d-mat{background:#2A1F00;color:#FCD34D}
:root.dark .d-cien{background:#1E1545;color:#C4B5FD}:root.dark .d-hist{background:#2A1A00;color:#FCD34D}
:root.dark .d-geo{background:#0C2D48;color:#7DD3FC}:root.dark .d-ing{background:#3D0A24;color:#F9A8D4}
:root.dark .d-art{background:#3D0A24;color:#F9A8D4}:root.dark .d-ef{background:#052E16;color:#86EFAC}
:root.dark .d-rel{background:#1E1545;color:#C4B5FD}:root.dark .d-fin{background:#1E2A45;color:#93B4F5}
:root.dark .d-let{background:#2A1A00;color:#FDBA74}
:root.dark .cell-empty{background:#374151}
:root.dark table th{background:#4F7FE8}:root.dark table th:first-child{background:#3B6FD4}
:root.dark table td:first-child{background:#1E2A45;color:#93B4F5}

input,select{background:var(--card);color:var(--text)}
input::placeholder{color:var(--text3)}

/* PRINT */
@media print{
  .topbar,.hero,.tabs,.turno-tabs,.search-wrap,.grid,.nav-links,.btn-pdf,.legenda,footer,#dark-toggle{display:none!important}
  .schedule-wrap{box-shadow:none;border:1px solid #ccc;break-inside:avoid}
  .app{max-width:100%;padding:0}
  body{background:#fff;color:#000}
  table th{background:#1A3A8F!important;color:#fff!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  table td{-webkit-print-color-adjust:exact;print-color-adjust:exact}
}

/* RESPONSIVE */
@media(max-width:700px){
  .grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr))}
  table{font-size:.72rem}
  .schedule-header{padding:14px 16px}
  .sh-title{font-size:1rem}
  .tabs{flex-wrap:wrap}
}
</style>
</head>

// MAPEAMENTO DE CORES POR DISCIPLINA
// ══════════════════════════════════════════════════════════════════════════════
function discClass(d){
  if(!d)return'cell-empty';
  const u=d.toUpperCase();
  if(u.includes('L. PORT')||u.includes('LET. LIT'))return'd-port';
  if(u.includes('MAT')||u.includes('LET. MAT'))return'd-mat';
  if(u.includes('CIEN')||u.includes('LET. CIEN'))return'd-cien';
  if(u.includes('HIST'))return'd-hist';
  if(u.includes('GEO'))return'd-geo';
  if(u.includes('ING'))return'd-ing';
  if(u.includes('ART'))return'd-art';
  if(u.includes('ED. FÍS')||u.includes('ED. FÍSICA'))return'd-ef';
  if(u.includes('ENS. REL'))return'd-rel';
  if(u.includes('EDUC. FINAN')||u.includes('EDU. FINAN'))return'd-fin';
  if(u.includes('LET.'))return'd-let';
  return'd-fin';
}

// STATE
// ══════════════════════════════════════════════════════════════════════════════
let mode='turma',turno='manha',selected=null;

function switchMode(m){
  mode=m;selected=null;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.textContent.includes(m==='turma'?'Turma':'Professor')));
  document.getElementById('search').value='';
  document.getElementById('search').placeholder=m==='turma'?'Buscar turma...':'Buscar professor...';
  renderGrid();
  document.getElementById('schedule-area').innerHTML='';
}

function switchTurno(t){
  turno=t;selected=null;
  document.querySelectorAll('.turno-tab').forEach(b=>b.classList.toggle('active',b.dataset.turno===t));
  renderGrid();
  document.getElementById('schedule-area').innerHTML='';
}

function getDB(){return turno==='manha'?HORARIOS_MANHA:HORARIOS_TARDE;}

// ── Construir índice de professores a partir dos dados ──
function buildProfIndex(){
  const profs={};
  [HORARIOS_MANHA,HORARIOS_TARDE].forEach((db,ti)=>{
    const turnoKey=ti===0?'manha':'tarde';
    Object.entries(db.turmas).forEach(([turma,dias])=>{
      ['seg','ter','qua','qui','sex'].forEach((d,di)=>{
        (dias[d]||[]).forEach((cell,ai)=>{
          if(!cell)return;
          const parts=cell.split('\n');
          if(parts.length<2)return;
          const disc=parts[0],prof=parts[1];
          if(!profs[prof])profs[prof]={turnos:new Set(),disciplinas:new Set(),aulas:{}};
          profs[prof].turnos.add(turnoKey);
          profs[prof].disciplinas.add(disc);
          const key=turnoKey+'_'+d+'_'+ai;
          if(!profs[prof].aulas[turnoKey])profs[prof].aulas[turnoKey]={seg:[],ter:[],qua:[],qui:[],sex:[]};
          profs[prof].aulas[turnoKey][d][ai]=turma+'\n'+disc;
        });
      });
    });
  });
  return profs;
}
const PROFS=buildProfIndex();

function renderGrid(){
  const grid=document.getElementById('items-grid');
  const q=document.getElementById('search').value.toLowerCase();
  if(mode==='turma'){
    const db=getDB();
    const turmas=Object.keys(db.turmas).filter(t=>t.toLowerCase().includes(q));
    grid.innerHTML=turmas.map(t=>{
      const serie=t.match(/\d/)?.[0]||'';
      return`<div class="item-card${selected===t?' active':''}" onclick="selectItem('${t}')"><div class="ic-name">${t}</div><div class="ic-meta">${turno==='manha'?'Manhã':'Tarde'}</div></div>`;
    }).join('')||'<p style="color:var(--text3);font-size:.85rem;padding:20px;text-align:center;grid-column:1/-1">Nenhuma turma encontrada.</p>';
  } else {
    const profNames=Object.keys(PROFS).filter(p=>PROFS[p].turnos.has(turno)).filter(p=>p.toLowerCase().includes(q)).sort();
    grid.innerHTML=profNames.map(p=>{
      const discs=[...PROFS[p].disciplinas].slice(0,2).join(', ');
      return`<div class="item-card${selected===p?' active':''}" onclick="selectItem('${p.replace(/'/g,"\\'")}')"><div class="ic-name">${p}</div><div class="ic-meta">${discs}</div></div>`;
    }).join('')||'<p style="color:var(--text3);font-size:.85rem;padding:20px;text-align:center;grid-column:1/-1">Nenhum professor encontrado.</p>';
  }
}

function filterItems(){renderGrid();}

function selectItem(name){
  selected=name;
  renderGrid();
  renderSchedule(name);
  document.getElementById('schedule-area').scrollIntoView({behavior:'smooth',block:'start'});
}

// RENDERIZAR TABELA
// ══════════════════════════════════════════════════════════════════════════════
function renderSchedule(name){
  const db=getDB();
  const diasLabel=['SEG','TER','QUA','QUI','SEX'];
  const diasKey=['seg','ter','qua','qui','sex'];
  const isLongo=[true,false,false,true,false]; // seg,ter,qua,qui,sex
  const horas=db.horas;

  let data; // array de [dia][aula] = {disc,extra}
  let icon,title,subtitle;

  if(mode==='turma'){
    const t=db.turmas[name];
    if(!t)return;
    icon='<path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/>';
    title=name;
    subtitle=(turno==='manha'?'Manhã · 7:30':'Tarde · 13:00')+' · EMEB Maria Iraci';
    data=diasKey.map((d,di)=>{
      const aulas=t[d]||[];
      return aulas.map(cell=>{
        if(!cell)return{disc:'',extra:''};
        const p=cell.split('\n');
        return{disc:p[0]||'',extra:p[1]||''};
      });
    });
  } else {
    const prof=PROFS[name];
    if(!prof||!prof.aulas[turno])return;
    icon='<circle cx="12" cy="7" r="4"/><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>';
    title=name;
    const discs=[...prof.disciplinas].join(', ');
    subtitle=discs+' · '+(turno==='manha'?'Manhã':'Tarde');
    const pa=prof.aulas[turno];
    data=diasKey.map(d=>{
      const aulas=pa[d]||[];
      const max=isLongo[diasKey.indexOf(d)]?5:4;
      const arr=[];
      for(let i=0;i<max;i++){
        if(!aulas[i])arr.push({disc:'',extra:''});
        else{const p=aulas[i].split('\n');arr.push({disc:p[1]||'',extra:p[0]||''});}
      }
      return arr;
    });
  }

  // Montar tabela
  const maxAulas=5;
  let html=`<div class="schedule-wrap"><div class="schedule-header"><div class="sh-left"><div class="sh-icon"><svg viewBox="0 0 24 24">${icon}</svg></div><div><div class="sh-title">${title}</div><div class="sh-sub">${subtitle}</div></div></div><button class="btn-pdf" onclick="window.print()"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Baixar PDF</button></div>`;
  html+=`<div class="tbl-scroll"><table><thead><tr><th></th>`;
  diasLabel.forEach(d=>html+=`<th>${d}</th>`);
  html+=`</tr></thead><tbody>`;

  for(let a=0;a<maxAulas;a++){
    // Verificar se esta aula existe neste dia
    const rowHasContent=data.some((diaAulas,di)=>{
      const max=isLongo[di]?5:4;
      return a<max;
    });
    if(!rowHasContent)continue;

    // Inserir linha de recreio antes da aula correta
    // Dias normais: recreio após A2 (antes de A3, index 2)
    // Dias longos: recreio após A3 (antes de A4, index 3)
    // Como a tabela mistura dias normais e longos, mostrar recreio na posição adequada
    if(a===2){
      html+=`<tr><td class="cell-recreio" colspan="6" style="text-align:center;font-size:.72rem;color:var(--text3);font-style:italic;padding:6px;background:var(--card2)"><svg viewBox="0 0 24 24" style="width:12px;height:12px;vertical-align:-1px;stroke:currentColor;fill:none;stroke-width:2;margin-right:4px"><path d="M18 8h1a4 4 0 010 8h-1M2 8h16v9a4 4 0 01-4 4H6a4 4 0 01-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg>Recreio · 20 min</td></tr>`;
    }

    html+=`<tr>`;
    // Label da aula com horário
    const hNormal=horas.normal[a>=2?a-0:a]; // ajustar após recreio
    const hLongo=horas.longo[a];
    const horaLabel=hLongo||hNormal||'';
    html+=`<td>A${a+1}<br><span style="font-size:.62rem;font-weight:500">${horaLabel}</span></td>`;

    diasKey.forEach((d,di)=>{
      const max=isLongo[di]?5:4;
      if(a>=max){
        html+=`<td class="cell-empty">—</td>`;
        return;
      }
      const cell=data[di][a];
      if(!cell||!cell.disc){
        html+=`<td class="cell-empty">—</td>`;
      } else {
        const cls=discClass(cell.disc);
        const extraTag=mode==='turma'?'cell-prof':'cell-turma';
        html+=`<td class="${cls}"><div class="cell-disc">${cell.disc}</div><div class="${extraTag}">${cell.extra}</div></td>`;
      }
    });
    html+=`</tr>`;
  }

  html+=`</tbody></table></div>`;

  // Legenda
  html+=`<div class="legenda">`;
  const legs=[['d-port','Português'],['d-mat','Matemática'],['d-cien','Ciências'],['d-hist','História'],['d-geo','Geografia'],['d-ing','Inglês'],['d-art','Arte'],['d-ef','Ed. Física'],['d-rel','Ens. Religioso'],['d-fin','Ed. Financeira'],['d-let','Letramento']];
  legs.forEach(([c,n])=>html+=`<div class="leg-item"><div class="leg-dot ${c}"></div>${n}</div>`);
  html+=`</div></div>`;

  document.getElementById('schedule-area').innerHTML=html;
}

// ══════════════════════════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('yr').textContent=new Date().getFullYear();
  renderGrid();
});
</script>
