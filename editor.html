<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MIRA — Editor de Aulas</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#F8F7F2;--card:#FFFFFF;--card2:#F0EEE8;--border:#DDD9CF;
  --text:#0F2461;--text2:#1A3A8F;--text3:#6A7F9A;
  --shadow:0 2px 8px rgba(15,36,97,.08),0 4px 16px rgba(15,36,97,.06);
  --r:12px;--rs:8px;
  --pri:#1A3A8F;--pri-bg:#EEF0FB;--pri-t:#0F2461;
  --gold:#E8B800;--gold-bg:#FFFBE6;--gold-t:#9A7800;
  --green:#2E9E6B;--green-bg:#E8F5EF;--green-t:#1A6B47;
  --red:#C0392B;--red-bg:#FEECEC;
  --orange:#E07B00;--orange-bg:#FFF3E0;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
@keyframes spin{to{transform:rotate(360deg)}}

/* TOPBAR */
.topbar{background:var(--pri);padding:0 22px;display:flex;align-items:center;justify-content:space-between;height:54px;position:sticky;top:0;z-index:100;box-shadow:0 2px 10px rgba(15,36,97,.2)}
.topbar-brand{display:flex;align-items:center;gap:12px}
.topbar-badge{font-size:.7rem;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.28);border-radius:20px;padding:3px 11px;color:#fff;font-weight:700;letter-spacing:.8px;text-transform:uppercase}
.topbar-actions{display:flex;align-items:center;gap:14px}
.topbar-user{font-size:.8rem;color:rgba(255,255,255,.8);font-weight:500}
.topbar-link{font-size:.8rem;color:rgba(255,255,255,.8);text-decoration:none;transition:color .2s}
.topbar-link:hover{color:#fff}
.btn-logout{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.28);color:#fff;border-radius:8px;padding:6px 14px;font-size:.8rem;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s}
.btn-logout:hover{background:rgba(255,255,255,.24)}

/* LAYOUT */
.layout{display:grid;grid-template-columns:270px 1fr;min-height:calc(100vh - 54px)}

/* SIDEBAR */
.sidebar{background:var(--card);border-right:1px solid var(--border);overflow-y:auto;display:flex;flex-direction:column}
.sidebar-hdr{padding:14px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.sidebar-hdr h3{font-family:'Plus Jakarta Sans',sans-serif;font-size:.85rem;font-weight:700;color:var(--text);margin-bottom:10px}
.sidebar-hdr select{width:100%;padding:8px 10px;border:1.5px solid var(--border);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:.85rem;color:var(--text);outline:none;background:#fff}
.sidebar-hdr select:focus{border-color:var(--pri)}
.bim-sec{border-bottom:1px solid var(--border)}
.bim-hd{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;cursor:pointer;background:var(--bg)}
.bim-hd:hover{background:var(--pri-bg)}
.bim-nm{font-family:'Plus Jakarta Sans',sans-serif;font-size:.8rem;font-weight:700;color:var(--pri)}
.bim-ch{color:var(--text3);font-size:.7rem;transition:transform .2s}
.bim-ch.open{transform:rotate(90deg)}
.aula-list{display:none}
.aula-list.open{display:block}
.aula-item{display:flex;align-items:center;gap:8px;padding:9px 16px 9px 24px;cursor:pointer;font-size:.82rem;color:var(--text2);border-left:3px solid transparent;transition:all .15s}
.aula-item:hover{background:var(--bg)}
.aula-item.active{background:var(--pri-bg);color:var(--pri);border-left-color:var(--pri);font-weight:700}
.pending-dot{width:7px;height:7px;border-radius:50%;background:var(--orange);flex-shrink:0}

/* MAIN */
.main{padding:22px;overflow-y:auto;background:var(--bg)}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;color:var(--text3);text-align:center;gap:12px}
.empty-state h3{font-size:1.05rem;color:var(--text2)}

/* EDITOR HEADER */
.ed-header{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:18px;flex-wrap:wrap}
.ed-title{font-family:'Plus Jakarta Sans',sans-serif;font-size:1.2rem;font-weight:800;color:var(--text)}
.ed-meta{font-size:.78rem;color:var(--text3);margin-top:3px}
.save-area{display:flex;align-items:center;gap:8px;flex-shrink:0;flex-wrap:wrap}
.save-status{font-size:.78rem;padding:4px 10px;border-radius:20px;font-weight:600}
.save-status.saving{background:var(--gold-bg);color:var(--gold-t)}
.save-status.saved{background:var(--green-bg);color:var(--green-t)}
.save-status.error{background:var(--red-bg);color:var(--red)}
.save-status.pending{background:var(--orange-bg);color:var(--orange)}

/* ALERT BANNER */
.alert-banner{padding:10px 14px;border-radius:8px;font-size:.83rem;margin-bottom:14px;display:none;line-height:1.5}
.alert-banner.show{display:block}
.alert-ok{background:var(--green-bg);color:var(--green-t);border:1px solid var(--green)}
.alert-err{background:var(--red-bg);color:var(--red);border:1px solid var(--red)}
.alert-pending{background:var(--orange-bg);color:var(--orange);border:1px solid var(--orange)}

/* ROLE BANNER */
.role-banner{background:var(--pri-bg);border:1px solid var(--border);border-radius:var(--rs);padding:10px 14px;font-size:.82rem;color:var(--pri-t);margin-bottom:16px;display:flex;align-items:center;gap:8px}

/* SECTIONS */
.sec{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:18px;margin-bottom:12px;box-shadow:var(--shadow)}
.sec-title{font-family:'Plus Jakarta Sans',sans-serif;font-size:.85rem;font-weight:700;color:var(--text);margin-bottom:12px;display:flex;align-items:center;gap:7px}
.sec-title svg{color:var(--pri)}

/* FIELDS */
.field{margin-bottom:10px}
.field label{display:block;font-size:.7rem;font-weight:700;color:var(--text3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px}
.field input,.field select,.field textarea{width:100%;padding:8px 11px;border:1.5px solid var(--border);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:.87rem;color:var(--text);background:#fff;outline:none;transition:border-color .2s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--pri)}
.field textarea{resize:vertical;min-height:80px;line-height:1.65}

/* STEPS */
.steps-wrap{display:flex;flex-direction:column;gap:7px;margin-bottom:10px}
.step-row{display:flex;gap:8px;align-items:flex-start}
.step-num{width:26px;height:26px;border-radius:6px;background:var(--pri);color:#fff;font-family:'Plus Jakarta Sans',sans-serif;font-size:.72rem;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:5px}
.step-row textarea{flex:1;padding:7px 10px;border:1.5px solid var(--border);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:.84rem;resize:vertical;min-height:50px;outline:none;transition:border-color .2s}
.step-row textarea:focus{border-color:var(--pri)}
.btn-rm{background:var(--red-bg);color:var(--red);border:1px solid var(--red);border-radius:6px;width:26px;height:26px;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:5px;transition:all .2s}
.btn-rm:hover{background:var(--red);color:#fff}

/* WYSIWYG EDITOR */
.wysiwyg-wrap{border:1.5px solid var(--border);border-radius:8px;overflow:hidden;transition:border-color .2s}
.wysiwyg-wrap:focus-within{border-color:var(--pri)}
.wysiwyg-toolbar{display:flex;flex-wrap:wrap;gap:2px;padding:6px 8px;background:var(--bg);border-bottom:1px solid var(--border)}
.tb-btn{width:28px;height:28px;border:1px solid transparent;border-radius:5px;background:transparent;cursor:pointer;font-size:.85rem;display:flex;align-items:center;justify-content:center;color:var(--text2);transition:all .15s;font-family:'DM Sans',sans-serif}
.tb-btn:hover{background:var(--pri-bg);border-color:var(--border)}
.tb-btn.active{background:var(--pri);color:#fff;border-color:var(--pri)}
.tb-sep{width:1px;background:var(--border);margin:3px 3px;flex-shrink:0}
.tb-color{width:22px;height:22px;border:none;border-radius:4px;cursor:pointer;padding:0;background:transparent}
.wysiwyg-body{min-height:160px;padding:12px 14px;font-size:.88rem;line-height:1.75;color:var(--text);outline:none;background:#fff}
.wysiwyg-body[contenteditable]:empty::before{content:attr(data-placeholder);color:var(--text3)}
.wysiwyg-body img{max-width:100%;border-radius:6px;margin:6px 0}
.img-upload-btn{display:inline-flex;align-items:center;gap:5px;background:var(--pri-bg);border:1px solid var(--pri);color:var(--pri-t);border-radius:6px;padding:4px 10px;font-size:.75rem;font-weight:700;cursor:pointer;transition:all .2s;margin-top:6px}
.img-upload-btn:hover{background:var(--pri);color:#fff}
.img-input{display:none}

/* PDF SECTION */
.pdf-list{display:flex;flex-direction:column;gap:7px;margin-bottom:12px}
.pdf-item{display:flex;align-items:center;gap:10px;padding:10px 13px;background:var(--bg);border:1px solid var(--border);border-radius:8px}
.pdf-icon{width:34px;height:34px;background:var(--red-bg);border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:1rem}
.pdf-info{flex:1;min-width:0}
.pdf-name{font-size:.83rem;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pdf-size{font-size:.7rem;color:var(--text3)}
.pdf-status{font-size:.68rem;font-weight:700;padding:2px 8px;border-radius:10px}
.pdf-status.publicado{background:var(--green-bg);color:var(--green-t)}
.pdf-status.pendente{background:var(--orange-bg);color:var(--orange)}
.upload-zone{border:2px dashed var(--border);border-radius:9px;padding:20px;text-align:center;cursor:pointer;transition:all .2s}
.upload-zone:hover,.upload-zone.drag{border-color:var(--pri);background:var(--pri-bg)}
.upload-zone p{font-size:.82rem;color:var(--text3);margin-top:5px}
.upload-zone strong{color:var(--pri)}
.upload-progress{display:none;margin-top:10px}
.prog-bar{height:5px;background:var(--border);border-radius:10px;overflow:hidden}
.prog-fill{height:100%;background:var(--pri);border-radius:10px;transition:width .3s}
.prog-label{font-size:.75rem;color:var(--text3);margin-top:4px;text-align:center}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:.84rem;font-weight:700;cursor:pointer;border:none;transition:all .2s}
.btn-pri{background:var(--pri);color:#fff}.btn-pri:hover{background:var(--pri-t)}
.btn-green{background:var(--green);color:#fff}.btn-green:hover{background:#1A6B47}
.btn-ghost{background:var(--card2);color:var(--text2);border:1px solid var(--border)}.btn-ghost:hover{border-color:var(--pri);color:var(--pri)}
.btn-sm{padding:5px 12px;font-size:.77rem}
.btn-red{background:var(--red-bg);color:var(--red);border:1px solid var(--red)}.btn-red:hover{background:var(--red);color:#fff}
.btn:disabled{opacity:.5;cursor:not-allowed}

.loading{display:flex;align-items:center;gap:10px;justify-content:center;padding:40px;color:var(--text3);font-size:.88rem}
.spinner{width:18px;height:18px;border:2.5px solid var(--border);border-top-color:var(--pri);border-radius:50%;animation:spin .7s linear infinite}

@media(max-width:768px){.layout{grid-template-columns:1fr}.sidebar{border-right:none;border-bottom:1px solid var(--border);max-height:220px}}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-brand">
    <svg width="80" height="22" viewBox="0 0 110 30" fill="none">
      <circle cx="15" cy="15" r="13" stroke="rgba(255,255,255,0.65)" stroke-width="1.3"/>
      <circle cx="15" cy="15" r="9" stroke="rgba(255,255,255,0.65)" stroke-width="1.3"/>
      <circle cx="15" cy="15" r="4.5" stroke="rgba(255,255,255,0.65)" stroke-width="1.3"/>
      <circle cx="15" cy="15" r="2" fill="white"/>
      <line x1="15" y1="1" x2="15" y2="6" stroke="white" stroke-width="1.3" stroke-linecap="round"/>
      <line x1="15" y1="24" x2="15" y2="29" stroke="white" stroke-width="1.3" stroke-linecap="round"/>
      <line x1="1" y1="15" x2="6" y2="15" stroke="white" stroke-width="1.3" stroke-linecap="round"/>
      <line x1="24" y1="15" x2="29" y2="15" stroke="white" stroke-width="1.3" stroke-linecap="round"/>
      <text x="36" y="21" font-family="'Plus Jakarta Sans',sans-serif" font-size="18" font-weight="900" fill="white" letter-spacing="-0.5">MIRA</text>
    </svg>
    <span class="topbar-badge">Editor</span>
  </div>
  <div class="topbar-actions">
    <span class="topbar-user" id="userNome"></span>
    <a href="index.html" class="topbar-link" target="_blank">Ver portal ↗</a>
    <button class="btn-logout" onclick="doLogout()">Sair</button>
  </div>
</div>

<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-hdr">
      <h3>Disciplinas</h3>
      <select id="disc-sel" onchange="loadBimestres()">
        <option value="">Selecione uma disciplina...</option>
      </select>
    </div>
    <div id="bim-tree"></div>
  </aside>

  <main class="main" id="main-area">
    <div class="empty-state">
      <svg width="56" height="56" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      <h3>Selecione uma aula para editar</h3>
      <p>Escolha uma disciplina e depois uma aula no menu lateral.</p>
    </div>
  </main>
</div>

<input type="file" id="imgInput" accept="image/*" style="display:none" onchange="insertImage(this.files[0])">
<input type="file" id="pdfInput" accept=".pdf" style="display:none" onchange="uploadPDF(this.files[0])">

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, updateDoc, collection, getDocs, query, orderBy, serverTimestamp, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getStorage, ref as sRef, uploadBytesResumable, getDownloadURL, deleteObject } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

const cfg={apiKey:"AIzaSyD_IoIlMiPvDRoJJWM2_LMg6cZQqcB7tao",authDomain:"mira-b17cb.firebaseapp.com",projectId:"mira-b17cb",storageBucket:"mira-b17cb.firebasestorage.app",messagingSenderId:"989601201413",appId:"1:989601201413:web:e81c9f2455c908a5594b6c"};
const app=initializeApp(cfg);
const auth=getAuth(app);
const db=getFirestore(app);
const storage=getStorage(app);

let currentUser=null,userRole=null;
let currentDiscId=null,currentBimId=null,currentAulaId=null;
let currentAulaData=null;
let saveTimer=null;
const DISC_ID='educacao-financeira';

// ── AUTH ──────────────────────────────────────────────────────────────────────
onAuthStateChanged(auth,async u=>{
  if(!u){window.location.href='login.html';return;}
  const snap=await getDoc(doc(db,'usuarios',u.uid));
  if(!snap.exists()){window.location.href='login.html';return;}
  const data=snap.data();
  if(data.status==='inativo'){alert('Conta inativa.');await signOut(auth);window.location.href='login.html';return;}
  currentUser={uid:u.uid,...data};
  userRole=data.role;
  document.getElementById('userNome').textContent=data.nome||u.email;
  loadDiscs();
});
window.doLogout=async()=>{await signOut(auth);window.location.href='login.html';};

// ── LOAD DISCIPLINES ──────────────────────────────────────────────────────────
async function loadDiscs(){
  const snap=await getDocs(collection(db,'disciplinas'));
  const sel=document.getElementById('disc-sel');
  sel.innerHTML='<option value="">Selecione uma disciplina...</option>';
  snap.docs.forEach(d=>{
    const o=document.createElement('option');
    o.value=d.id;o.textContent=(d.data().emoji||'')+' '+d.data().nome;
    sel.appendChild(o);
  });
}

// ── LOAD BIMESTRES ────────────────────────────────────────────────────────────
window.loadBimestres=async function(){
  currentDiscId=document.getElementById('disc-sel').value;
  const tree=document.getElementById('bim-tree');
  if(!currentDiscId){tree.innerHTML='';return;}
  tree.innerHTML='<div class="loading"><div class="spinner"></div></div>';
  const bimsSnap=await getDocs(query(collection(db,'disciplinas',currentDiscId,'bimestres'),orderBy('ordem')));
  if(bimsSnap.empty){tree.innerHTML='<p style="padding:14px;font-size:.84rem;color:var(--text3)">Sem bimestres.</p>';return;}
  let html='';
  for(const bim of bimsSnap.docs){
    const b=bim.data();
    const aulasSnap=await getDocs(query(collection(db,'disciplinas',currentDiscId,'bimestres',bim.id,'aulas'),orderBy('ordem')));
    html+=`<div class="bim-sec">
      <div class="bim-hd" onclick="toggleBim('bl-${bim.id}','bc-${bim.id}')">
        <span class="bim-nm">${b.nome}</span>
        <span class="bim-ch" id="bc-${bim.id}">▶</span>
      </div>
      <div class="aula-list" id="bl-${bim.id}">`;
    aulasSnap.docs.forEach(aula=>{
      const a=aula.data();
      const hasPending=a.status==='pendente';
      const badge=a.tipo==='prova'?'📝':a.tipo==='recup'?'🔄':'📖';
      html+=`<div class="aula-item" id="ai-${aula.id}" onclick="openAula('${bim.id}','${aula.id}')">
        ${hasPending?'<div class="pending-dot" title="Sugestão pendente"></div>':badge}
        <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${a.titulo}</span>
      </div>`;
    });
    html+=`</div></div>`;
  }
  tree.innerHTML=html;
};

window.toggleBim=function(lid,cid){
  document.getElementById(lid).classList.toggle('open');
  document.getElementById(cid).classList.toggle('open');
};

// ── OPEN AULA ─────────────────────────────────────────────────────────────────
window.openAula=async function(bimId,aulaId){
  currentBimId=bimId;currentAulaId=aulaId;
  document.querySelectorAll('.aula-item').forEach(i=>i.classList.remove('active'));
  document.getElementById('ai-'+aulaId)?.classList.add('active');
  document.getElementById('main-area').innerHTML='<div class="loading"><div class="spinner"></div> Carregando aula...</div>';
  const snap=await getDoc(doc(db,'disciplinas',currentDiscId,'bimestres',bimId,'aulas',aulaId));
  if(!snap.exists()){document.getElementById('main-area').innerHTML='<div class="empty-state"><p>Aula não encontrada.</p></div>';return;}
  currentAulaData={id:aulaId,...snap.data()};
  renderEditor(currentAulaData);
};

// ── SET SAVE STATUS ───────────────────────────────────────────────────────────
function setSaveStatus(state,msg){
  const el=document.getElementById('save-status');
  if(!el)return;
  el.className='save-status '+state;
  el.textContent=msg;
}

// ── RENDER EDITOR ─────────────────────────────────────────────────────────────
function renderEditor(a){
  const isAdmin=userRole==='admin';
  const isPending=a.status==='pendente';
  const passos=(a.passos||[]);
  const pdfs=(a.pdfs||[]);

  // Decide which content to show for editing
  // Admin: edits published fields directly
  // Colaborador: edits suggestion fields (prefixed with 'sug_')
  const editConteudo=isAdmin?(a.conteudo||''):(a.sug_conteudo!==undefined?a.sug_conteudo:(a.conteudo||''));
  const editAtividades=isAdmin?(a.atividades||[]):(a.sug_atividades!==undefined?a.sug_atividades:(a.atividades||[]));
  const editMateriais=isAdmin?(a.materiais||[]):(a.sug_materiais!==undefined?a.sug_materiais:(a.materiais||[]));
  const editRefs=isAdmin?(a.referencias||''):(a.sug_referencias!==undefined?a.sug_referencias:(a.referencias||''));
  const editPassos=isAdmin?(a.passos||[]):(a.sug_passos!==undefined?a.sug_passos:(a.passos||[]));

  const atividadesText=typeof editAtividades==='string'?editAtividades:editAtividades.map(av=>typeof av==='string'?av:(av.titulo?(av.titulo+'\n'+(av.desc||'')):JSON.stringify(av))).join('\n\n');
  const materiaisText=typeof editMateriais==='string'?editMateriais:(editMateriais||[]).filter(m=>typeof m==='string'&&!m.startsWith('<button')).join('\n');

  const stepsHtml=editPassos.map((p,i)=>`<div class="step-row" id="sr-${i}">
    <div class="step-num">${i+1}</div>
    <textarea oninput="autoSave()">${p}</textarea>
    <button class="btn-rm" onclick="rmStep(${i})">×</button>
  </div>`).join('');

  const pdfsHtml=pdfs.length?pdfs.map(pdf=>`<div class="pdf-item" id="pdf-${pdf.path?.replace(/\//g,'_')||pdf.nome}">
    <div class="pdf-icon">📄</div>
    <div class="pdf-info"><div class="pdf-name">${pdf.nome}</div><div class="pdf-size">${pdf.tamanho||''}</div></div>
    <span class="pdf-status ${pdf.status||'publicado'}">${pdf.status==='pendente'?'Pendente':'Publicado'}</span>
    ${isAdmin&&pdf.status==='pendente'?`<button class="btn btn-sm btn-green" onclick="approvePDF('${pdf.path}')">Aprovar</button>`:''}
    <button class="btn btn-sm btn-red" onclick="removePDF('${pdf.path}','${pdf.nome}')">Remover</button>
  </div>`).join(''):'<p style="font-size:.82rem;color:var(--text3)">Nenhum PDF ainda.</p>';

  document.getElementById('main-area').innerHTML=`
    <div class="ed-header">
      <div>
        <div class="ed-title">${a.titulo}</div>
        <div class="ed-meta">${a.tipo==='prova'?'📝 Prova':a.tipo==='recup'?'🔄 Recuperação':'📖 Aula'}</div>
      </div>
      <div class="save-area">
        <span class="save-status" id="save-status"></span>
        ${isAdmin
          ?`<button class="btn btn-pri" onclick="salvarAdmin()">💾 Publicar</button>`
          :`<button class="btn btn-pri" onclick="salvarColab()">📤 Enviar sugestão</button>`}
      </div>
    </div>

    ${!isAdmin?`<div class="role-banner">✏️ Você é <strong>colaborador</strong>. Suas edições serão enviadas como sugestão e publicadas após aprovação do administrador.</div>`:''}
    ${isAdmin&&isPending?`<div class="alert-banner alert-pending show">⏳ Esta aula tem uma sugestão pendente de aprovação. Você pode ver e editar abaixo antes de publicar.</div>`:''}

    <div class="alert-banner alert-ok" id="alert-ok"></div>
    <div class="alert-banner alert-err" id="alert-err"></div>

    <!-- Objetivo e Habilidades -->
    <div class="sec">
      <div class="sec-title">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
        Objetivo e Habilidades
      </div>
      <div class="field"><label>Objetivo da aula</label><textarea id="f-obj" rows="2" oninput="autoSave()">${a.objetivo||''}</textarea></div>
      <div class="field"><label>Habilidades BNCC/EF</label><input type="text" id="f-hab" value="${a.hab||''}" placeholder="Ex: EF06PLA01, EF06MA01" oninput="autoSave()"></div>
    </div>

    <!-- Conteúdo para o Professor (WYSIWYG) -->
    <div class="sec">
      <div class="sec-title">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 18h6M10 22h4"/><path d="M15.09 14c.18-.98.65-1.74 1.41-2.5A7 7 0 1012 19"/></svg>
        Conteúdo para o Professor
      </div>
      <div class="wysiwyg-wrap">
        <div class="wysiwyg-toolbar" id="tb-conteudo">
          <button class="tb-btn" title="Negrito" onclick="fmt('bold')"><strong>B</strong></button>
          <button class="tb-btn" title="Itálico" onclick="fmt('italic')"><em>I</em></button>
          <button class="tb-btn" title="Sublinhado" onclick="fmt('underline')"><u>U</u></button>
          <div class="tb-sep"></div>
          <button class="tb-btn" title="Título" onclick="fmt('formatBlock','H3')">T</button>
          <button class="tb-btn" title="Lista" onclick="fmt('insertUnorderedList')">☰</button>
          <button class="tb-btn" title="Lista numerada" onclick="fmt('insertOrderedList')">1.</button>
          <div class="tb-sep"></div>
          <button class="tb-btn" title="Cor do texto" style="position:relative;overflow:hidden" onclick="document.getElementById('color-pick').click()">A <span style="display:block;width:14px;height:3px;background:var(--red);border-radius:2px;margin-top:1px"></span></button>
          <input type="color" id="color-pick" style="position:absolute;opacity:0;width:0;height:0" onchange="fmtColor(this.value)">
          <div class="tb-sep"></div>
          <button class="tb-btn" title="Inserir imagem" onclick="document.getElementById('imgInput').click()">🖼</button>
          <div class="tb-sep"></div>
          <button class="tb-btn" title="Remover formatação" onclick="fmt('removeFormat')">✕</button>
        </div>
        <div class="wysiwyg-body" id="f-conteudo" contenteditable="true" data-placeholder="Digite o conteúdo para o professor aqui..." oninput="autoSave()">${editConteudo}</div>
      </div>
    </div>

    <!-- Desenvolvimento da Aula -->
    <div class="sec">
      <div class="sec-title">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        Desenvolvimento da Aula (50 min)
      </div>
      <div class="steps-wrap" id="steps-list">${stepsHtml}</div>
      <button class="btn btn-ghost btn-sm" onclick="addStep()">+ Adicionar passo</button>
    </div>

    <!-- Atividades (textarea simples) -->
    <div class="sec">
      <div class="sec-title">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        Atividades
      </div>
      <div class="field">
        <label>Descreva as atividades da aula</label>
        <textarea id="f-atividades" rows="5" placeholder="Descreva as atividades..." oninput="autoSave()">${atividadesText}</textarea>
      </div>
    </div>

    <!-- Materiais da Aula -->
    <div class="sec">
      <div class="sec-title">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/></svg>
        Materiais da Aula
      </div>
      <div class="field">
        <label>Um material por linha</label>
        <textarea id="f-materiais" rows="4" placeholder="Ex: Folha modelo impressa&#10;Cartolina para mural&#10;Canetas coloridas" oninput="autoSave()">${materiaisText}</textarea>
      </div>
    </div>

    <!-- Atividades para Download (PDFs) -->
    <div class="sec">
      <div class="sec-title">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><polyline points="9 15 12 18 15 15"/></svg>
        Atividades para Download (PDFs)
      </div>
      <div class="pdf-list" id="pdf-list">${pdfsHtml}</div>
      <div class="upload-zone" id="upload-zone" onclick="document.getElementById('pdfInput').click()" ondragover="event.preventDefault();this.classList.add('drag')" ondragleave="this.classList.remove('drag')" ondrop="handleDrop(event)">
        <svg width="28" height="28" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" style="margin:0 auto;display:block;color:var(--pri)"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        <strong>Clique ou arraste</strong> um PDF aqui
        <p>Máximo 10 MB · Apenas PDF${!isAdmin?' · Ficará pendente até aprovação do admin':''}</p>
      </div>
      <div class="upload-progress" id="upload-progress">
        <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
        <div class="prog-label" id="prog-label">Enviando...</div>
      </div>
    </div>

    <!-- Avaliação -->
    <div class="sec">
      <div class="sec-title">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
        Avaliação
      </div>
      <div class="field">
        <textarea id="f-aval" rows="2" oninput="autoSave()">${a.avaliacao||''}</textarea>
      </div>
    </div>

    <!-- Referências -->
    <div class="sec">
      <div class="sec-title">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M4 19.5V4.5A2.5 2.5 0 016.5 2H20v20H6.5A2.5 2.5 0 014 19.5z"/></svg>
        Referências Bibliográficas
      </div>
      <div class="field">
        <textarea id="f-refs" rows="3" placeholder="Ex: CONEF. Educação Financeira nas Escolas..." oninput="autoSave()">${editRefs}</textarea>
      </div>
    </div>
  `;

  setSaveStatus('','');
}

// ── WYSIWYG ───────────────────────────────────────────────────────────────────
window.fmt=function(cmd,val){
  document.getElementById('f-conteudo').focus();
  document.execCommand(cmd,false,val||null);
};
window.fmtColor=function(color){
  document.getElementById('f-conteudo').focus();
  document.execCommand('foreColor',false,color);
};

// ── IMAGE UPLOAD ──────────────────────────────────────────────────────────────
window.insertImage=async function(file){
  if(!file)return;
  if(!file.type.startsWith('image/')){alert('Apenas imagens.');return;}
  if(file.size>5*1024*1024){alert('Imagem máx 5 MB.');return;}
  const path=`imagens/${currentDiscId}/${currentBimId}/${currentAulaId}/${Date.now()}_${file.name}`;
  const r=sRef(storage,path);
  const task=uploadBytesResumable(r,file);
  setSaveStatus('saving','Enviando imagem...');
  task.on('state_changed',null,e=>setSaveStatus('error','Erro: '+e.message),async()=>{
    const url=await getDownloadURL(task.snapshot.ref);
    const el=document.getElementById('f-conteudo');
    el.focus();
    document.execCommand('insertHTML',false,`<img src="${url}" alt="${file.name}" style="max-width:100%;border-radius:6px;margin:6px 0">`);
    setSaveStatus('saved','✓ Imagem inserida');
    document.getElementById('imgInput').value='';
  });
};

// ── STEPS ─────────────────────────────────────────────────────────────────────
window.addStep=function(){
  const list=document.getElementById('steps-list');
  const count=list.querySelectorAll('.step-row').length;
  const div=document.createElement('div');
  div.innerHTML=`<div class="step-row" id="sr-${count}"><div class="step-num">${count+1}</div><textarea oninput="autoSave()"></textarea><button class="btn-rm" onclick="rmStep(${count})">×</button></div>`;
  list.appendChild(div.firstElementChild);
};
window.rmStep=function(i){
  document.getElementById('sr-'+i)?.remove();
  document.querySelectorAll('.step-row').forEach((r,idx)=>{
    r.id='sr-'+idx;
    r.querySelector('.step-num').textContent=idx+1;
    r.querySelector('button').setAttribute('onclick',`rmStep(${idx})`);
  });
};

// ── AUTO SAVE TRIGGER ─────────────────────────────────────────────────────────
window.autoSave=function(){
  setSaveStatus('saving','Salvando...');
  clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>{
    if(userRole==='admin')salvarAdmin(true);
    else salvarColab(true);
  },2000);
};

function getEditorData(){
  const passos=[...document.querySelectorAll('.step-row textarea')].map(t=>t.value.trim()).filter(Boolean);
  const materiais=(document.getElementById('f-materiais')?.value||'').split('\n').map(s=>s.trim()).filter(Boolean);
  const atividadesRaw=(document.getElementById('f-atividades')?.value||'').trim();
  const atividades=atividadesRaw?[atividadesRaw]:[];
  return {
    objetivo:document.getElementById('f-obj')?.value||'',
    hab:document.getElementById('f-hab')?.value||'',
    conteudo:document.getElementById('f-conteudo')?.innerHTML||'',
    passos,materiais,atividades,
    avaliacao:document.getElementById('f-aval')?.value||'',
    referencias:document.getElementById('f-refs')?.value||''
  };
}

// ── ADMIN SAVE (publishes directly) ──────────────────────────────────────────
window.salvarAdmin=async function(auto=false){
  if(!currentDiscId||!currentBimId||!currentAulaId)return;
  setSaveStatus('saving','Publicando...');
  const data=getEditorData();
  try{
    await updateDoc(doc(db,'disciplinas',currentDiscId,'bimestres',currentBimId,'aulas',currentAulaId),{
      objetivo:data.objetivo,hab:data.hab,
      conteudo:data.conteudo,
      conteudoPublicado:data.conteudo,
      passos:data.passos,
      passosPublicados:data.passos,
      atividades:data.atividades,
      atividadesPublicadas:data.atividades,
      materiais:data.materiais,
      materiaisPublicados:data.materiais,
      avaliacao:data.avaliacao,
      avaliacaoPublicada:data.avaliacao,
      referencias:data.referencias,
      referenciasPublicadas:data.referencias,
      status:'publicado',
      // clear any pending suggestion
      sug_conteudo:null,sug_passos:null,sug_atividades:null,sug_materiais:null,sug_referencias:null,
      ultimaEdicao:serverTimestamp(),editadoPor:currentUser.uid
    });
    setSaveStatus('saved','✓ Publicado');
    if(!auto){showAlert('ok','Aula publicada com sucesso!');}
    // refresh sidebar
    loadBimestres();
  }catch(e){setSaveStatus('error','Erro');showAlert('err','Erro: '+e.message);}
};

// ── COLABORADOR SAVE (saves as suggestion) ────────────────────────────────────
window.salvarColab=async function(auto=false){
  if(!currentDiscId||!currentBimId||!currentAulaId)return;
  setSaveStatus('saving','Enviando...');
  const data=getEditorData();
  try{
    await updateDoc(doc(db,'disciplinas',currentDiscId,'bimestres',currentBimId,'aulas',currentAulaId),{
      sug_conteudo:data.conteudo,
      sug_passos:data.passos,
      sug_atividades:data.atividades,
      sug_materiais:data.materiais,
      sug_referencias:data.referencias,
      sug_avaliacao:data.avaliacao,
      status:'pendente',
      sugeridoPor:currentUser.uid,
      sugeridoEm:serverTimestamp()
    });
    setSaveStatus('pending','⏳ Aguardando aprovação');
    if(!auto){showAlert('pending','Sugestão enviada! O administrador irá revisar e publicar.');}
    loadBimestres();
  }catch(e){setSaveStatus('error','Erro');showAlert('err','Erro: '+e.message);}
};

// ── PDF UPLOAD ────────────────────────────────────────────────────────────────
window.handleDrop=function(e){e.preventDefault();document.getElementById('upload-zone').classList.remove('drag');const f=e.dataTransfer.files[0];if(f)uploadPDF(f);};
window.uploadPDF=async function(file){
  if(!file)return;
  if(file.type!=='application/pdf'){alert('Apenas PDFs.');return;}
  if(file.size>10*1024*1024){alert('Máx 10 MB.');return;}
  const prog=document.getElementById('upload-progress');
  const fill=document.getElementById('prog-fill');
  const label=document.getElementById('prog-label');
  prog.style.display='block';
  const path=`pdfs/${currentDiscId}/${currentBimId}/${currentAulaId}/${Date.now()}_${file.name}`;
  const r=sRef(storage,path);
  const task=uploadBytesResumable(r,file);
  task.on('state_changed',
    snap=>{const pct=Math.round(snap.bytesTransferred/snap.totalBytes*100);fill.style.width=pct+'%';label.textContent=`Enviando... ${pct}%`;},
    err=>{label.textContent='Erro: '+err.message;},
    async()=>{
      const url=await getDownloadURL(task.snapshot.ref);
      const pdfData={nome:file.name,url,path,tamanho:(file.size/1024).toFixed(0)+' KB',status:userRole==='admin'?'publicado':'pendente',adicionadoEm:new Date().toISOString()};
      const snap=await getDoc(doc(db,'disciplinas',currentDiscId,'bimestres',currentBimId,'aulas',currentAulaId));
      const pdfs=[...(snap.data()?.pdfs||[]),pdfData];
      await updateDoc(doc(db,'disciplinas',currentDiscId,'bimestres',currentBimId,'aulas',currentAulaId),{pdfs});
      // Update UI
      const list=document.getElementById('pdf-list');
      if(list.querySelector('p'))list.innerHTML='';
      const div=document.createElement('div');
      div.innerHTML=`<div class="pdf-item" id="pdf-${path.replace(/\//g,'_')}">
        <div class="pdf-icon">📄</div>
        <div class="pdf-info"><div class="pdf-name">${file.name}</div><div class="pdf-size">${pdfData.tamanho}</div></div>
        <span class="pdf-status ${pdfData.status}">${pdfData.status==='pendente'?'Pendente':'Publicado'}</span>
        <button class="btn btn-sm btn-red" onclick="removePDF('${path}','${file.name}')">Remover</button>
      </div>`;
      list.appendChild(div.firstElementChild);
      prog.style.display='none';fill.style.width='0%';
      document.getElementById('pdfInput').value='';
      showAlert('ok',userRole==='admin'?'PDF publicado!':'PDF enviado! Aguardando aprovação do administrador.');
      loadBimestres();
    }
  );
};

window.approvePDF=async function(path){
  const snap=await getDoc(doc(db,'disciplinas',currentDiscId,'bimestres',currentBimId,'aulas',currentAulaId));
  const pdfs=(snap.data()?.pdfs||[]).map(p=>p.path===path?{...p,status:'publicado'}:p);
  await updateDoc(doc(db,'disciplinas',currentDiscId,'bimestres',currentBimId,'aulas',currentAulaId),{pdfs});
  openAula(currentBimId,currentAulaId);
};

window.removePDF=async function(path,nome){
  if(!confirm(`Remover "${nome}"?`))return;
  try{await deleteObject(sRef(storage,path));}catch(e){console.warn(e);}
  const snap=await getDoc(doc(db,'disciplinas',currentDiscId,'bimestres',currentBimId,'aulas',currentAulaId));
  const pdfs=(snap.data()?.pdfs||[]).filter(p=>p.path!==path);
  await updateDoc(doc(db,'disciplinas',currentDiscId,'bimestres',currentBimId,'aulas',currentAulaId),{pdfs});
  document.getElementById('pdf-'+path.replace(/\//g,'_'))?.remove();
  const list=document.getElementById('pdf-list');
  if(!list.querySelector('.pdf-item'))list.innerHTML='<p style="font-size:.82rem;color:var(--text3)">Nenhum PDF ainda.</p>';
};

function showAlert(type,msg){
  const el=document.getElementById(type==='ok'?'alert-ok':'alert-err');
  if(!el)return;
  el.textContent=msg;el.className=`alert-banner ${type==='ok'?'alert-ok':type==='pending'?'alert-pending':'alert-err'} show`;
  setTimeout(()=>el.classList.remove('show'),5000);
}

document.addEventListener('keydown',e=>{if((e.ctrlKey||e.metaKey)&&e.key==='s'){e.preventDefault();userRole==='admin'?salvarAdmin():salvarColab();}});
</script>
</body>
</html>
